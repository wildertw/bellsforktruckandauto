  <main id="main" class="py-5">
    <div class="container article-wrap">
      <nav aria-label="Breadcrumb" class="mb-3">
        <a href="blog.html" class="text-decoration-none">&larr; Back to Blog</a>
      </nav>

      <div id="loadingState" class="text-center py-5">
        <div class="spinner-border text-danger mb-3" role="status"></div>
        <p class="text-muted mb-0">Loading article...</p>
      </div>

      <article id="article" style="display:none;">
        <header class="mb-4">
          <span id="postCategory" class="badge bg-danger mb-2">General</span>
          <h1 id="postTitle" class="fw-bold mb-2"></h1>
          <div class="text-muted small">
            <span id="postDate"></span>
            <span class="mx-2">|</span>
            <span id="postAuthor"></span>
          </div>
        </header>

        <div id="postHero" class="article-hero" style="display:none;">
          <img id="postHeroImg" src="" alt="" loading="eager" />
        </div>

        <section id="postContent" class="article-content"></section>

        <section class="mt-4 pt-3 border-top">
          <h2 class="h6 text-uppercase text-muted mb-3">Share this post</h2>
          <div class="d-flex flex-wrap gap-2">
            <a id="shareFacebook" class="share-btn" href="#" target="_blank" rel="noopener">Facebook</a>
            <a id="shareX" class="share-btn" href="#" target="_blank" rel="noopener">X</a>
            <a id="shareEmail" class="share-btn" href="#">Email</a>
            <button id="copyLinkBtn" class="share-btn bg-white" type="button">Copy Link</button>
          </div>
        </section>

        <section class="mt-5">
          <h2 class="h5 mb-3">Comments</h2>
          <div id="commentStatus" class="small mb-2"></div>
          <form id="commentForm" class="mb-4">
            <div class="row g-2">
              <div class="col-md-4">
                <input id="commentName" type="text" class="form-control" placeholder="Your name" required maxlength="80">
              </div>
              <div class="col-md-8">
                <input id="commentWebsite" type="text" class="form-control d-none" autocomplete="off" tabindex="-1" aria-hidden="true">
              </div>
            </div>
            <div class="mt-2">
              <textarea id="commentBody" class="form-control" rows="4" placeholder="Write a comment..." required maxlength="1200"></textarea>
            </div>
            <button type="submit" class="btn btn-danger mt-2">Post Comment</button>
          </form>
          <div id="commentsList" class="d-grid gap-2"></div>
        </section>
      </article>

      <section id="errorState" style="display:none;" class="text-center py-5">
        <h2 class="h4 mb-2">Post not found</h2>
        <p class="text-muted">The article may have been moved or is still in draft mode.</p>
        <a href="blog.html" class="btn btn-outline-dark">Return to Blog</a>
