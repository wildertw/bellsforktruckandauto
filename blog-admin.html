<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog Admin | Bells Fork Auto & Truck</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .admin-shell { max-width: 1200px; margin: 0 auto; }
    .panel { background: #fff; border: 1px solid #e3e7ed; border-radius: 12px; padding: 1rem; }
    #editor { height: 360px; }
    .ql-toolbar.ql-snow,.ql-container.ql-snow { border-color: #d5dbe3; }
    .post-row td { vertical-align: middle; }
    .preview-pane { min-height: 220px; border: 1px dashed #d5dbe3; border-radius: 10px; padding: .85rem; background: #fff; }
    .tag-pill { background: #f0f3f8; border-radius: 999px; padding: .2rem .6rem; font-size: .78rem; }
  </style>
</head>
<body>
  <main class="container py-4 admin-shell">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
      <h1 class="h3 mb-0">Blog CMS</h1>
      <div id="sessionBar" class="d-none">
        <span class="small text-muted me-2" id="sessionUser"></span>
        <button class="btn btn-outline-secondary btn-sm" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>

    <section id="loginPanel" class="panel">
      <h2 class="h5 mb-3">Admin Login</h2>
      <form id="loginForm" class="row g-2">
        <div class="col-md-4">
          <input class="form-control" id="loginUser" type="text" placeholder="Username" required>
        </div>
        <div class="col-md-4">
          <input class="form-control" id="loginPass" type="password" placeholder="Password" required>
        </div>
        <div class="col-md-4 d-grid">
          <button class="btn btn-dark" type="submit">Sign In</button>
        </div>
      </form>
      <div class="small mt-2" id="loginStatus"></div>
    </section>

    <section id="adminPanel" class="d-none">
      <div class="panel mb-3">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
          <h2 class="h5 mb-0">Create / Edit Post</h2>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="newPostBtn">New Post</button>
            <button type="button" class="btn btn-outline-primary btn-sm" id="previewBtn">Preview</button>
          </div>
        </div>

        <form id="postForm" class="row g-3">
          <div class="col-md-8">
            <label class="form-label">Title</label>
            <input class="form-control" id="postTitleInput" required maxlength="160">
          </div>
          <div class="col-md-4">
            <label class="form-label">Slug</label>
            <input class="form-control" id="postSlugInput" maxlength="100">
          </div>
          <div class="col-md-4">
            <label class="form-label">Author</label>
            <input class="form-control" id="postAuthorInput" maxlength="80">
          </div>
          <div class="col-md-4">
            <label class="form-label">Category</label>
            <input class="form-control" id="postCategoryInput" placeholder="General" maxlength="40">
          </div>
          <div class="col-md-4">
            <label class="form-label">Status</label>
            <select class="form-select" id="postStatusInput">
              <option value="draft">Draft</option>
              <option value="published">Published</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Tags (comma-separated)</label>
            <input class="form-control" id="postTagsInput" placeholder="financing, trucks, diesel">
          </div>
          <div class="col-md-6">
            <label class="form-label">Meta Description</label>
            <input class="form-control" id="postMetaInput" maxlength="320">
          </div>
          <div class="col-12">
            <label class="form-label">Excerpt (optional)</label>
            <textarea class="form-control" id="postExcerptInput" rows="2" maxlength="320"></textarea>
          </div>
          <div class="col-md-7">
            <label class="form-label">Featured Image URL</label>
            <input class="form-control" id="postImageInput" placeholder="https://...">
          </div>
          <div class="col-md-5">
            <label class="form-label">Upload Featured Image</label>
            <input class="form-control" id="postImageFile" type="file" accept="image/*">
          </div>
          <div class="col-12">
            <img id="postImagePreview" alt="Featured image preview" style="max-width:260px;display:none;border-radius:8px;border:1px solid #e3e7ed;">
          </div>
          <div class="col-12">
            <label class="form-label">Content</label>
            <div id="editor"></div>
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-success" type="submit">Save Post</button>
            <button class="btn btn-outline-danger" id="deletePostBtn" type="button">Delete Post</button>
          </div>
          <div class="small" id="formStatus"></div>
        </form>
      </div>

      <div class="panel mb-3">
        <h2 class="h5 mb-3">All Posts</h2>
        <div class="table-responsive">
          <table class="table table-sm align-middle">
            <thead class="table-light">
              <tr>
                <th>Title</th>
                <th>Status</th>
                <th>Category</th>
                <th>Updated</th>
                <th style="width:130px;">Actions</th>
              </tr>
            </thead>
            <tbody id="postTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
          <h2 class="h5 mb-0">Comments</h2>
          <button id="refreshCommentsBtn" class="btn btn-outline-secondary btn-sm" type="button">Refresh</button>
        </div>
        <div class="table-responsive">
          <table class="table table-sm align-middle">
            <thead class="table-light">
              <tr>
                <th>Post</th>
                <th>Name</th>
                <th>Comment</th>
                <th>Status</th>
                <th>Date</th>
                <th style="width:170px;">Actions</th>
              </tr>
            </thead>
            <tbody id="commentTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="h5 modal-title mb-0">Post Preview</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <h3 class="h4" id="previewTitle"></h3>
          <div class="small text-muted mb-2" id="previewMeta"></div>
          <img id="previewImage" alt="" style="display:none;max-width:100%;border-radius:8px;margin-bottom:1rem;">
          <div id="previewContent" class="preview-pane"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <script src="assets/js/blog-admin.js" defer></script>
</body>
</html>
