[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

# ── Edge Functions (server-side auth gate for admin pages) ──
[[edge_functions]]
  function = "admin-auth"
  path = "/admin-dashboard.html"

[[edge_functions]]
  function = "admin-auth"
  path = "/admin"

[[edge_functions]]
  function = "admin-auth"
  path = "/admin/blog"

[[edge_functions]]
  function = "admin-auth"
  path = "/admin/upload"

# ── Global Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob: res.cloudinary.com; frame-src 'self' www.google.com; connect-src 'self' vpic.nhtsa.dot.gov; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"

# ── Caching Headers ──

# Optimized hero images — long cache
[[headers]]
  for = "/assets/hero/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Vehicle images — cache 30 days
[[headers]]
  for = "/assets/vehicles/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Static assets (logo, favicon, etc.)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Minified JS bundle — long cache
[[headers]]
  for = "/assets/js/bundle.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Minified CSS
[[headers]]
  for = "/style.min.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# HTML pages — short cache with revalidation
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# VDP pages
[[headers]]
  for = "/vdp/*"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# Inventory JSON — 5 min cache
[[headers]]
  for = "/inventory.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=600"

[[redirects]]
  from = "/photos/*"
  to = "/.netlify/functions/photo-serve/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/blog/:slug"
  to = "/blog-post.html?slug=:slug"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin-dashboard.html"
  status = 200
  force = true

[[redirects]]
  from = "/admin/blog"
  to = "/admin-dashboard.html"
  status = 200
  force = true

[[redirects]]
  from = "/admin/upload"
  to = "/admin-dashboard.html"
  status = 200
  force = true

# Legacy URL redirects (bellsforktruckandauto.com migration)
[[redirects]]
  from = "/vehicle/*"
  to = "/inventory.html"
  status = 301

[[redirects]]
  from = "/forms.php"
  to = "/financing/"
  status = 301

[[redirects]]
  from = "/service/"
  to = "/contact.html"
  status = 301

[[redirects]]
  from = "/service"
  to = "/contact.html"
  status = 301

# 404 catch-all — MUST be last redirect rule
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
