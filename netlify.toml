[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

# ── Caching Headers ──

# Optimized hero images — long cache
[[headers]]
  for = "/assets/hero/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Vehicle images — cache 30 days
[[headers]]
  for = "/assets/vehicles/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Static assets (logo, favicon, etc.)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Minified JS bundle — long cache
[[headers]]
  for = "/assets/js/bundle.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Minified CSS
[[headers]]
  for = "/style.min.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# HTML pages — short cache with revalidation
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# VDP pages
[[headers]]
  for = "/vdp/*"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# Inventory JSON — 5 min cache
[[headers]]
  for = "/inventory.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=600"

[[redirects]]
  from = "/photos/*"
  to = "/.netlify/functions/photo-serve/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/blog/:slug"
  to = "/blog-post.html?slug=:slug"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin-dashboard.html"
  status = 200
  force = true

[[redirects]]
  from = "/admin/blog"
  to = "/admin-dashboard.html"
  status = 200
  force = true

[[redirects]]
  from = "/admin/upload"
  to = "/admin-dashboard.html"
  status = 200
  force = true

# Legacy URL redirects (bellsforktruckandauto.com migration)
[[redirects]]
  from = "/vehicle/*"
  to = "/inventory.html"
  status = 301

[[redirects]]
  from = "/forms.php"
  to = "/financing/"
  status = 301

[[redirects]]
  from = "/service/"
  to = "/contact.html"
  status = 301

[[redirects]]
  from = "/service"
  to = "/contact.html"
  status = 301

# 404 catch-all — MUST be last redirect rule
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
