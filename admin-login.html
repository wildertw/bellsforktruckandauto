<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | Bells Fork Auto &amp; Truck</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    body{
      margin:0; min-height:100vh;
      background: linear-gradient(135deg, #111111 0%, #2b0f15 55%, #111111 100%);
      display:flex; align-items:center; justify-content:center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .login-card{
      background:#fff; border-radius:16px; padding:2.5rem 2rem;
      width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,.4);
      margin:1rem;
    }
    .login-logo{
      display:block; max-width:200px; height:auto; margin:0 auto 1.25rem;
    }
    .login-title{
      text-align:center; font-size:1.35rem; font-weight:700; color:#111;
      margin-bottom:.25rem;
    }
    .login-subtitle{
      text-align:center; font-size:.9rem; color:#6c757d;
      margin-bottom:1.75rem;
    }
    .form-label{ font-weight:600; color:#333; font-size:.9rem; }
    .form-control{
      border-radius:8px; padding:.65rem .9rem; border:1.5px solid #dee2e6;
      font-size:.95rem;
    }
    .form-control:focus{
      border-color:#dc3545; box-shadow:0 0 0 .2rem rgba(220,53,69,.15);
    }
    .btn-login{
      background:#dc3545; border:none; color:#fff; font-weight:700;
      border-radius:8px; padding:.7rem 1.5rem; font-size:1rem;
      width:100%; transition: background .2s;
    }
    .btn-login:hover{ background:#b02a37; color:#fff; }
    .btn-login:disabled{ background:#e4949c; cursor:not-allowed; }
    .alert-danger{
      border-radius:8px; font-size:.88rem; padding:.65rem 1rem;
      border:none; background:#fff5f5; color:#dc3545;
    }
    .lock-icon{
      display:flex; align-items:center; justify-content:center;
      width:56px; height:56px; border-radius:50%; margin:0 auto 1rem;
      background: linear-gradient(135deg, #dc3545 0%, #b02a37 100%);
    }
    .lock-icon svg{ fill:#fff; width:28px; height:28px; }
    .footer-text{
      text-align:center; font-size:.78rem; color:#aaa; margin-top:1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
    </div>
    <div class="login-title">Admin Login</div>
    <div class="login-subtitle">Bells Fork Auto &amp; Truck</div>

    <form id="loginForm" autocomplete="off">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Enter your username" required autofocus autocomplete="username">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <div class="alert alert-danger d-none" id="errorMsg" role="alert"></div>

      <button type="submit" class="btn btn-login" id="loginBtn">
        <span id="loginText">Sign In</span>
        <span id="loginSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
      </button>
    </form>

    <div class="footer-text">Authorized personnel only</div>
  </div>

  <script>
    /* ── Credential store (SHA-256 hashed passwords) ── */
    const USERS = {
      'trey':  '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918',
      'frank': '8e0a49d96938eca5a973cb170f392fa6e117ac8e0bbae8f281f365d7fd3c4139'
    };

    /* SHA-256 helper using Web Crypto API */
    async function sha256(message) {
      const encoder = new TextEncoder();
      const data = encoder.encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    /* If already logged in, go straight to admin */
    (function checkSession() {
      const session = sessionStorage.getItem('bf_admin_session');
      if (session) {
        try {
          const data = JSON.parse(session);
          if (data && data.authenticated && data.user) {
            const dest = new URLSearchParams(window.location.search).get('redirect') || 'admin.html';
            window.location.replace(dest);
          }
        } catch (e) { /* ignore */ }
      }
    })();

    /* Login handler */
    const form     = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');
    const spinner  = document.getElementById('loginSpinner');
    const loginTxt = document.getElementById('loginText');

    let attempts = 0;
    const MAX_ATTEMPTS = 5;
    let lockoutUntil = 0;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('d-none');

      /* Check lockout */
      if (Date.now() < lockoutUntil) {
        const secs = Math.ceil((lockoutUntil - Date.now()) / 1000);
        errorMsg.textContent = `Too many attempts. Try again in ${secs} seconds.`;
        errorMsg.classList.remove('d-none');
        return;
      }

      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorMsg.textContent = 'Please enter both username and password.';
        errorMsg.classList.remove('d-none');
        return;
      }

      /* Show loading state */
      loginBtn.disabled = true;
      spinner.classList.remove('d-none');
      loginTxt.textContent = 'Signing in...';

      try {
        const hash = await sha256(password);
        const expectedHash = USERS[username];

        /* Small delay for UX */
        await new Promise(r => setTimeout(r, 400));

        if (expectedHash && hash === expectedHash) {
          /* Success */
          const displayName = username.charAt(0).toUpperCase() + username.slice(1);
          sessionStorage.setItem('bf_admin_session', JSON.stringify({
            authenticated: true,
            user: displayName,
            username: username,
            passwordHash: hash,
            loginTime: Date.now()
          }));

          const dest = new URLSearchParams(window.location.search).get('redirect') || 'admin.html';
          window.location.replace(dest);
        } else {
          /* Failed */
          attempts++;
          if (attempts >= MAX_ATTEMPTS) {
            lockoutUntil = Date.now() + 30000;
            errorMsg.textContent = 'Too many failed attempts. Locked out for 30 seconds.';
            attempts = 0;
          } else {
            errorMsg.textContent = 'Invalid username or password.';
          }
          errorMsg.classList.remove('d-none');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errorMsg.textContent = 'An error occurred. Please try again.';
        errorMsg.classList.remove('d-none');
      } finally {
        loginBtn.disabled = false;
        spinner.classList.add('d-none');
        loginTxt.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
